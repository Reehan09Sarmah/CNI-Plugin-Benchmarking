---
apiVersion: v1
kind: Pod
metadata: { name: iperf-server, labels: { app: throughput } }
spec:
  nodeName: midnight-07
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command: ["iperf3", "-s"]
    ports: [{ containerPort: 5201 }]
---
apiVersion: v1
kind: Pod
metadata: { name: iperf-client, labels: { app: throughput } }
spec:
  nodeName: prakhar-agarwal
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Pod
metadata: { name: netperf-server, labels: { app: latency } }
spec:
  nodeName: midnight-07
  containers:
  - name: netperf
    image: cilium/netperf
    command: ["netserver", "-D"]
    ports: [{ containerPort: 12865 }]
---
apiVersion: v1
kind: Pod
metadata: { name: netperf-client, labels: { app: latency } }
spec:
  nodeName: prakhar-agarwal
  containers:
  - name: netperf
    image: cilium/netperf
    command: ["/bin/sh", "-c", "sleep infinity"]
---
apiVersion: v1
kind: Pod
metadata: { name: fortio-server, labels: { app: microservice } }
spec:
  nodeName: midnight-07
  containers:
  - name: fortio
    image: fortio/fortio
    command: ["fortio", "server"]
    ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Pod
metadata: { name: fortio-client, labels: { app: microservice } }
spec:
  nodeName: prakhar-agarwal
  containers:
  - name: fortio
    image: fortio/fortio
    command: ["fortio", "server"]
